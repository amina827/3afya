<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000"
     font-family="Arial, sans-serif" font-size="12"
     stroke="#000" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ==================================================================
       TECHNICAL DRAWING  ·  1500 cc HDPE OIL BOTTLE  ·  FRONT VIEW
       Geometry rebuilt from the ChatGPT Afia reference:
         · cylindrical threaded neck
         · flat-topped rounded DOME shoulder  (narrower than lower body)
         · distinct INWARD WAIST PINCH
         · wider rectangular LOWER BODY with rounded corners
         · integrated HANDLE on right side with oval cut-out
       Scale: 1 mm = 2 px
       Centre-line  CL  at  x = 450
       Neck top y = 120       Base y = 722        (total 602 px = 301 mm)
       ================================================================== -->

  <defs>
    <marker id="arrE" viewBox="0 0 10 10" refX="10" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#000" stroke="none"/>
    </marker>
    <marker id="arrS" viewBox="0 0 10 10" refX="0" refY="5"
            markerWidth="9" markerHeight="9" orient="auto">
      <path d="M10,0 L0,5 L10,10 z" fill="#000" stroke="none"/>
    </marker>
  </defs>

  <!-- ================== drawing frame ================== -->
  <rect x="20" y="20" width="1160" height="960" stroke-width="1.2"/>
  <rect x="30" y="30" width="1140" height="940" stroke-width="0.5"/>

  <!-- ================== header ================== -->
  <text x="540" y="70" font-size="14" font-weight="bold"
        fill="#000" stroke="none" text-decoration="underline">FRONT VIEW</text>

  <!-- preform weight table -->
  <g stroke-width="0.7">
    <rect x="970" y="50" width="180" height="85"/>
    <line x1="970" y1="72"  x2="1150" y2="72"/>
    <line x1="970" y1="94"  x2="1150" y2="94"/>
    <line x1="970" y1="116" x2="1150" y2="116"/>
    <line x1="1060" y1="50" x2="1060" y2="135"/>
  </g>
  <g stroke="none" fill="#000" font-size="10">
    <text x="978"  y="65">Preform weight</text>
    <text x="1070" y="65">(grams)</text>
    <text x="1010" y="87">65</text>
    <text x="1005" y="109">60.6</text>
    <text x="1005" y="131">55.6</text>
    <text x="1105" y="96" transform="rotate(-90 1105 96)">SEE TABLE</text>
  </g>

  <!-- ================== centre-line (CL) ================== -->
  <line x1="450" y1="95" x2="450" y2="770"
        stroke-width="0.6" stroke-dasharray="14 3 2 3"/>

  <!-- ==================================================================
       NECK  (Ø 37.3 mm = 74.6 px  ·  x 412.7 … 487.3)
       Straight cylinder 16.5 mm tall  (y 120 … 153)
       ================================================================== -->
  <g stroke-width="1.4">
    <line x1="412.7" y1="120" x2="412.7" y2="153"/>
    <line x1="487.3" y1="120" x2="487.3" y2="153"/>
    <line x1="412.7" y1="120" x2="487.3" y2="120"/>
  </g>

  <!-- thread scallops -->
  <g stroke-width="0.6">
    <path d="M412.7,126 Q417,122 422,126 Q427,130 432,126 Q437,122 442,126
             Q447,130 452,126 Q457,122 462,126 Q467,130 472,126
             Q477,122 482,126 Q485,128 487.3,128"/>
    <path d="M412.7,133 Q417,129 422,133 Q427,137 432,133 Q437,129 442,133
             Q447,137 452,133 Q457,129 462,133 Q467,137 472,133
             Q477,129 482,133 Q485,135 487.3,135"/>
    <path d="M412.7,140 Q417,136 422,140 Q427,144 432,140 Q437,136 442,140
             Q447,144 452,140 Q457,136 462,140 Q467,144 472,140
             Q477,136 482,140 Q485,142 487.3,142"/>
    <path d="M412.7,147 Q417,143 422,147 Q427,151 432,147 Q437,143 442,147
             Q447,151 452,147 Q457,143 462,147 Q467,151 472,147
             Q477,143 482,147 Q485,149 487.3,149"/>
  </g>

  <!-- R4 neck-to-shoulder flare -->
  <g stroke-width="1.4">
    <path d="M412.7,153 Q408,156 406,162"/>
    <path d="M487.3,153 Q492,156 494,162"/>
  </g>

  <!-- ==================================================================
       DOME SHOULDER  (flat top, narrower than lower body)
       Left  peaks at  (362, 220)   · half-width 88 px
       Right peaks at  (538, 220)
       Then narrows toward the WAIST at y ≈ 350
       ================================================================== -->
  <!-- left shoulder -->
  <path stroke-width="1.5" d="
    M 406,162
    C 396,170 380,182 372,198
    C 365,210 362,218 362,228
    C 362,260 362,290 367,320
    C 370,338 374,348 376,358
    "/>
  <!-- right shoulder -->
  <path stroke-width="1.5" d="
    M 494,162
    C 504,170 520,182 528,198
    C 535,210 538,218 538,228
    C 538,252 538,276 536,298
    "/>

  <!-- ==================================================================
       WAIST  ·  inward pinch between shoulder and lower body
       Left waist IN at  (376, 358)   half-width 74 px  (narrowest)
       Right waist IN at (524, 400) – handle reconnects here
       ================================================================== -->
  <!-- left: waist pinch then widen outward to lower body -->
  <path stroke-width="1.5" d="
    M 376,358
    C 378,370 376,382 368,394
    C 358,410 348,422 342,438
    "/>

  <!-- ==================================================================
       LOWER BODY  ·  wider rectangular section, rounded corners
       Half-width 110 px (base 220 px ≈ 78.1 mm × 2.8)
       Left x = 340  ·  Right x = 560
       y 450 … 690    ·   base corner radius ≈ 20 px
       ================================================================== -->
  <!-- left lower body + base corner -->
  <path stroke-width="1.5" d="
    M 342,438
    C 340,450 340,462 340,478
    L 340,662
    C 340,682 344,698 356,710
    L 376,722
    L 524,722
    "/>
  <!-- right lower body + base corner -->
  <path stroke-width="1.5" d="
    M 560,438
    C 560,454 560,470 560,478
    L 560,662
    C 560,682 556,698 544,710
    L 524,722
    "/>
  <!-- base bottom line -->
  <line x1="376" y1="722" x2="524" y2="722" stroke-width="1.5"/>

  <!-- ==================================================================
       INTEGRATED HANDLE  (right side)
       Outer loop extends from upper shoulder out to x = 630
       and rejoins the body just above the waist, then blends into
       the lower-body silhouette at y ≈ 438.
       ================================================================== -->
  <!-- outer handle loop -->
  <path stroke-width="1.5" d="
    M 536,298
    C 568,305 598,320 614,345
    C 628,370 630,405 618,430
    C 608,448 588,450 570,442
    C 562,438 560,438 560,438
    "/>
  <!-- handle top blend into shoulder -->
  <path stroke-width="1.2" d="M 538,228 C 560,235 580,250 590,275"/>

  <!-- oval grip cut-out inside handle -->
  <path stroke-width="1.2" d="
    M 560,320
    C 574,312 590,320 598,338
    C 606,358 606,388 598,408
    C 592,420 578,422 568,414
    C 558,404 555,385 555,365
    C 555,348 555,332 560,320 Z
    "/>
  <!-- soft inner grip ridge -->
  <path stroke-width="0.5" d="
    M 566,330
    C 578,324 590,332 595,348
    C 601,365 601,388 594,402
    C 588,412 578,412 571,405
    C 564,396 562,380 562,365
    C 562,352 562,340 566,330 Z
    "/>

  <!-- ==================================================================
       DECORATIVE DIAGONAL EMBOSSED LINE  (label panel edge)
       Runs from left-shoulder base across to right-body waist
       ================================================================== -->
  <path stroke-width="0.7" d="M 372,300 Q 460,378 556,440"/>

  <!-- horizontal panel break at waist -->
  <line x1="340" y1="450" x2="560" y2="450"
        stroke-width="0.5" stroke-dasharray="4 2"/>

  <!-- ==================================================================
       FOUR HORIZONTAL GRIP RIBS  (lower body, front face)
       ================================================================== -->
  <g stroke-width="0.8">
    <rect x="370" y="515" width="160" height="7" rx="3.5" ry="3.5"/>
    <rect x="370" y="545" width="160" height="7" rx="3.5" ry="3.5"/>
    <rect x="370" y="575" width="160" height="7" rx="3.5" ry="3.5"/>
    <rect x="370" y="605" width="160" height="7" rx="3.5" ry="3.5"/>
  </g>
  <g stroke-width="0.3">
    <line x1="375" y1="519" x2="525" y2="519"/>
    <line x1="375" y1="549" x2="525" y2="549"/>
    <line x1="375" y1="579" x2="525" y2="579"/>
    <line x1="375" y1="609" x2="525" y2="609"/>
  </g>

  <!-- ==================================================================
       SIDE LOCKING / CLIP FEATURES  (both sides, upper + lower)
       ================================================================== -->
  <g stroke-width="0.9">
    <path d="M340,490 q-8,4 -8,11 q0,7 8,11"/>
    <path d="M340,645 q-8,4 -8,11 q0,7 8,11"/>
    <path d="M560,490 q8,4 8,11 q0,7 -8,11"/>
    <path d="M560,645 q8,4 8,11 q0,7 -8,11"/>
    <line x1="332" y1="496" x2="332" y2="508" stroke-width="0.5"/>
    <line x1="332" y1="651" x2="332" y2="663" stroke-width="0.5"/>
    <line x1="568" y1="496" x2="568" y2="508" stroke-width="0.5"/>
    <line x1="568" y1="651" x2="568" y2="663" stroke-width="0.5"/>
  </g>

  <!-- ==================================================================
       BASE FEET
       ================================================================== -->
  <g stroke-width="0.9">
    <path d="M386,722 q6,-8 18,-8 q12,0 18,8"/>
    <path d="M441,722 q6,-8 18,-8 q12,0 18,8"/>
    <path d="M496,722 q6,-8 18,-8 q12,0 18,8"/>
  </g>
  <line x1="376" y1="726" x2="524" y2="726" stroke-width="0.4" stroke-dasharray="2 2"/>

  <!-- ==================================================================
       FILL LEVEL DASHED LINE  (1500 cc)
       ================================================================== -->
  <line x1="340" y1="178" x2="830" y2="178"
        stroke-width="0.6" stroke-dasharray="12 3 2 3"/>

  <!-- ==================================================================
       SECTION LINES  A-A  and  B-B
       ================================================================== -->
  <!-- A-A through shoulder/handle root -->
  <g stroke-width="0.7">
    <line x1="400" y1="290" x2="400" y2="355" stroke-dasharray="10 2 2 2"/>
    <line x1="500" y1="290" x2="500" y2="355" stroke-dasharray="10 2 2 2"/>
  </g>
  <polygon points="395,355 405,355 400,367" fill="#000" stroke="none"/>
  <polygon points="495,355 505,355 500,367" fill="#000" stroke="none"/>
  <text x="394" y="285" stroke="none" fill="#000" font-weight="bold" font-size="13">A</text>
  <text x="494" y="285" stroke="none" fill="#000" font-weight="bold" font-size="13">A</text>

  <!-- B-B through lower body, below grip ribs -->
  <g stroke-width="0.7">
    <line x1="400" y1="655" x2="400" y2="715" stroke-dasharray="10 2 2 2"/>
    <line x1="500" y1="655" x2="500" y2="715" stroke-dasharray="10 2 2 2"/>
  </g>
  <polygon points="395,655 405,655 400,645" fill="#000" stroke="none"/>
  <polygon points="495,655 505,655 500,645" fill="#000" stroke="none"/>
  <text x="394" y="738" stroke="none" fill="#000" font-weight="bold" font-size="13">B</text>
  <text x="494" y="738" stroke="none" fill="#000" font-weight="bold" font-size="13">B</text>

  <!-- ==================================================================
       DIMENSIONS  (ISO style, all in mm)
       ================================================================== -->
  <g stroke-width="0.5" font-size="11">

    <!-- 38 mm NECK FINISH leader -->
    <path d="M180,78 L410,108" stroke-width="0.5"/>
    <circle cx="410" cy="108" r="2" fill="#000" stroke="none"/>
    <text x="70"  y="68"  stroke="none" fill="#000">38 mm NECK FINISH ACCORDING</text>
    <text x="95"  y="82"  stroke="none" fill="#000">TO CUSTOMER DRWG.</text>

    <!-- Ø 37.3 ± 0.5 neck diameter -->
    <line x1="412.7" y1="100" x2="412.7" y2="118"/>
    <line x1="487.3" y1="100" x2="487.3" y2="118"/>
    <line x1="412.7" y1="108" x2="487.3" y2="108"
          marker-start="url(#arrS)" marker-end="url(#arrE)"/>
    <text x="500" y="112" stroke="none" fill="#000">&#216; 37.3 &#177; 0.5</text>

    <!-- 16.5 upper vertical neck -->
    <line x1="355" y1="120" x2="405" y2="120"/>
    <line x1="355" y1="153" x2="405" y2="153"/>
    <line x1="370" y1="120" x2="370" y2="153"
          marker-start="url(#arrS)" marker-end="url(#arrE)"/>
    <text x="332" y="140" stroke="none" fill="#000">16.5</text>

    <!-- R4 shoulder callout -->
    <path d="M406,168 L360,180" stroke-width="0.5"/>
    <circle cx="406" cy="168" r="1.5" fill="#000" stroke="none"/>
    <text x="333" y="183" stroke="none" fill="#000">R4</text>

    <!-- 5.5 shoulder transition -->
    <line x1="355" y1="153" x2="405" y2="153"/>
    <line x1="355" y1="178" x2="405" y2="178"/>
    <line x1="370" y1="153" x2="370" y2="178"
          marker-start="url(#arrS)" marker-end="url(#arrE)"/>
    <text x="340" y="170" stroke="none" fill="#000">5.5</text>

    <!-- 1500 +21/0 cc  FILL LEVEL -->
    <text x="700" y="172" stroke="none" fill="#000" font-size="13">1500</text>
    <text x="740" y="166" stroke="none" fill="#000" font-size="9">+21</text>
    <text x="744" y="178" stroke="none" fill="#000" font-size="9">0</text>
    <text x="763" y="172" stroke="none" fill="#000" font-size="13">cc</text>
    <text x="705" y="192" stroke="none" fill="#000"
          font-size="11" text-decoration="underline">FILL LEVEL</text>

    <!-- 52.5 mid-body half-width -->
    <line x1="362" y1="228" x2="362" y2="252"/>
    <line x1="450" y1="228" x2="450" y2="252"/>
    <line x1="362" y1="242" x2="450" y2="242"
          marker-start="url(#arrE)" marker-end="url(#arrS)"/>
    <text x="392" y="238" stroke="none" fill="#000">52.5</text>

    <!-- 70 lower-body reference -->
    <line x1="340" y1="560" x2="300" y2="560"/>
    <line x1="310" y1="560" x2="310" y2="560"
          marker-start="url(#arrS)" marker-end="url(#arrE)"/>
    <text x="250" y="564" stroke="none" fill="#000">70</text>
    <line x1="300" y1="555" x2="300" y2="565"/>

    <!-- 51.5 upper body height (right side) -->
    <line x1="840" y1="178" x2="880" y2="178"/>
    <line x1="840" y1="281" x2="880" y2="281"/>
    <line x1="865" y1="178" x2="865" y2="281"
          marker-start="url(#arrS)" marker-end="url(#arrE)"/>
    <text x="885" y="233" stroke="none" fill="#000">51.5</text>

    <!-- 301 ± 1.2 total height (far left) -->
    <line x1="160" y1="120" x2="320" y2="120"/>
    <line x1="160" y1="722" x2="376" y2="722"/>
    <line x1="180" y1="120" x2="180" y2="722"
          marker-start="url(#arrS)" marker-end="url(#arrE)"/>
    <text x="140" y="425" stroke="none" fill="#000"
          font-size="13" font-weight="bold"
          transform="rotate(-90 140 425)">301 &#177; 1.2</text>

    <!-- 78.1 base width -->
    <line x1="376" y1="735" x2="376" y2="770"/>
    <line x1="524" y1="735" x2="524" y2="770"/>
    <line x1="376" y1="758" x2="524" y2="758"
          marker-start="url(#arrS)" marker-end="url(#arrE)"/>
    <text x="437" y="753" stroke="none" fill="#000">78.1</text>

    <!-- 0.6 base thickness -->
    <line x1="524" y1="722" x2="595" y2="722"/>
    <line x1="524" y1="726" x2="595" y2="726"/>
    <line x1="585" y1="716" x2="585" y2="732"
          marker-start="url(#arrS)" marker-end="url(#arrE)"/>
    <text x="600" y="728" stroke="none" fill="#000">0.6</text>

    <!-- 16 foot height -->
    <line x1="640" y1="706" x2="670" y2="706"/>
    <line x1="640" y1="722" x2="670" y2="722"/>
    <line x1="655" y1="706" x2="655" y2="722"
          marker-start="url(#arrS)" marker-end="url(#arrE)"/>
    <text x="675" y="718" stroke="none" fill="#000">16</text>

    <!-- SIPA H handle callout -->
    <path d="M632,395 L720,395" stroke-width="0.5"/>
    <circle cx="632" cy="395" r="1.5" fill="#000" stroke="none"/>
    <text x="728" y="399" stroke="none" fill="#000" font-weight="bold">SIPA H</text>

  </g>

  <!-- ==================================================================
       TITLE BLOCK  (bottom right)
       ================================================================== -->
  <g stroke-width="0.9">
    <rect x="780" y="850" width="370" height="100"/>
    <line x1="780" y1="880" x2="1150" y2="880"/>
    <line x1="780" y1="910" x2="1150" y2="910"/>
    <line x1="780" y1="930" x2="1150" y2="930"/>
    <line x1="920" y1="850"  x2="920" y2="950"/>
    <line x1="1050" y1="850" x2="1050" y2="950"/>
  </g>
  <g stroke="none" fill="#000" font-size="11">
    <text x="792"  y="870" font-weight="bold">PART NAME</text>
    <text x="932"  y="870" font-weight="bold">MATERIAL</text>
    <text x="1062" y="870" font-weight="bold">UNITS</text>

    <text x="792"  y="900">1500 cc OIL BOTTLE</text>
    <text x="932"  y="900">HDPE</text>
    <text x="1062" y="900">mm</text>

    <text x="792"  y="923">SCALE 1 : 2</text>
    <text x="932"  y="923">PROJECTION: ISO-E</text>
    <text x="1062" y="923">SHEET 1/1</text>

    <text x="792"  y="945" font-size="9">TOL: ±0.3 UNLESS STATED</text>
    <text x="932"  y="945" font-size="9">VIEW: FRONT</text>
    <text x="1062" y="945" font-size="9">REV A</text>
  </g>

</svg>
