<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     font-family="Arial, sans-serif" font-size="14"
     stroke="#e10000" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ==================================================================
       BOTTLE WIREFRAME OVERLAY  ·  Technical line drawing traced on top
       of the real Afia 1.5 L bottle reference photo.
       ================================================================== -->

  <!-- background photo -->
  <image xlink:href="bottle_ref.png"
         x="0" y="0" width="1000" height="1500"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- ============ CENTRE-LINE ============ -->
  <line x1="492" y1="30" x2="492" y2="1280"
        stroke-width="1.2" stroke-dasharray="18 4 3 4"/>

  <!-- ============ NECK OPENING (top rim) - SHIFTED DOWN ============ -->
  <g stroke-width="2.2">
    <!-- outer neck walls (top higher, bottom lower) -->
    <line x1="400" y1="75"  x2="400" y2="180"/>
    <line x1="584" y1="75"  x2="584" y2="180"/>
    <!-- top rim ellipse (moved down) -->
    <path d="M400,75 Q492,47 584,75"/>
    <path d="M400,75 Q492,103 584,75" stroke-dasharray="3 3"/>
  </g>
  <!-- thread scallops (repositioned within longer neck) -->
  <g stroke-width="1.0">
    <path d="M400,100 Q418,92 436,100 Q454,108 472,100 Q490,92 508,100 Q526,108 544,100 Q562,92 580,100 Q583,101 584,101"/>
    <path d="M400,122 Q418,114 436,122 Q454,130 472,122 Q490,114 508,122 Q526,130 544,122 Q562,114 580,122 Q583,123 584,123"/>
    <path d="M400,144 Q418,136 436,144 Q454,152 472,144 Q490,136 508,144 Q526,152 544,144 Q562,136 580,144 Q583,145 584,145"/>
    <path d="M400,166 Q418,158 436,166 Q454,174 472,166 Q490,158 508,166 Q526,174 544,166 Q562,158 580,166 Q583,167 584,167"/>
  </g>

  <!-- ============ DOME SHOULDER (starts from lowered neck) ============ -->
  <!-- left shoulder curve -->
  <path stroke-width="2.2" d="
    M 400,180
    C 370,200 335,235 308,275
    C 285,322 272,365 268,420
    "/>
  <!-- right shoulder curve (to handle attach) -->
  <path stroke-width="2.2" d="
    M 584,180
    C 616,200 648,235 675,272
    C 700,315 716,355 720,390
    "/>

  <!-- ============ WAIST  (inward pinch) ============ -->
  <!-- left waist  -  inflection raised again -->
  <path stroke-width="2.2" d="
    M 268,420
    C 268,440 282,475 305,495
    "/>
  <!-- right waist (continues smoothly behind handle) -->
  <path stroke-width="2.2" d="
    M 720,390
    C 724,450 720,540 710,600
    C 708,640 695,665 680,685
    "/>

  <!-- ============ LOWER BODY  (shortened slightly) ============ -->
  <!-- left lower body  -  inflection raised again  -->
  <path stroke-width="2.2" d="
    M 305,495
    C 280,540 252,595 228,645
    C 216,690 215,740 215,790
    L 215,1205
    C 215,1230 222,1247 236,1257
    L 265,1270
    L 720,1270
    "/>
  <!-- right lower body (from below handle bottom) -->
  <path stroke-width="2.2" d="
    M 680,685
    C 710,710 745,745 758,790
    L 758,1205
    C 758,1230 751,1247 737,1257
    L 720,1270
    "/>

  <!-- ============ HANDLE (slight left overlap) ============ -->
  <!-- outer handle loop -->
  <path stroke-width="2.2" d="
    M 560,365
    C 630,365 700,405 738,470
    C 768,535 770,620 748,690
    C 728,745 685,775 635,765
    C 605,755 588,730 582,700
    "/>
  <!-- top attachment blend into shoulder -->
  <path stroke-width="2.2" d="
    M 560,365
    C 550,370 540,380 535,390
    "/>
  <!-- bottom attachment blend into body -->
  <path stroke-width="2.2" d="
    M 582,700
    C 580,715 580,730 580,745
    "/>

  <!-- inner oval grip cut-out (elongated vertically) -->
  <path stroke-width="1.6" d="
    M 605,425
    C 655,420 700,455 722,510
    C 742,568 742,638 722,685
    C 704,722 670,738 640,728
    C 615,718 605,695 605,665
    C 603,610 603,550 605,495
    C 605,460 605,435 605,425 Z
    "/>
  <!-- soft inner ridge -->
  <path stroke-width="0.9" opacity="0.7" d="
    M 615,440
    C 660,435 695,470 712,518
    C 730,570 730,632 712,674
    C 696,706 665,720 640,712
    C 620,704 615,683 615,660
    C 613,608 613,552 615,505
    C 615,470 615,448 615,440 Z
    "/>

  <!-- ============ DECORATIVE LABEL-EDGE DIAGONAL ============ -->
  <path stroke-width="1.4" d="M 300,470 Q 500,620 720,730"/>

  <!-- ============ FOUR GRIP RIBS (lower body) ============ -->
  <g stroke-width="1.4">
    <rect x="320" y="950"  width="350" height="14" rx="7"/>
    <rect x="320" y="1000" width="350" height="14" rx="7"/>
    <rect x="320" y="1050" width="350" height="14" rx="7"/>
    <rect x="320" y="1100" width="350" height="14" rx="7"/>
  </g>

  <!-- ============ SIDE CLIP FEATURES ============ -->
  <g stroke-width="1.4">
    <path d="M215,910  q-14,6 -14,20 q0,14 14,20"/>
    <path d="M215,1250 q-14,6 -14,20 q0,14 14,20"/>
    <path d="M758,910  q14,6 14,20 q0,14 -14,20"/>
    <path d="M758,1250 q14,6 14,20 q0,14 -14,20"/>
  </g>

  <!-- ============ BASE FEET ============ -->
  <g stroke-width="1.4">
    <path d="M290,1270 q10,-12 28,-12 q18,0 28,12"/>
    <path d="M430,1270 q10,-12 28,-12 q18,0 28,12"/>
    <path d="M570,1270 q10,-12 28,-12 q18,0 28,12"/>
  </g>
  <!-- base parting line slightly above bottom -->
  <line x1="265" y1="1257" x2="720" y2="1257" stroke-width="0.8" stroke-dasharray="5 3"/>

  <!-- ============ FILL-LEVEL DASHED REFERENCE ============ -->
  <line x1="215" y1="320" x2="920" y2="320"
        stroke-width="1.1" stroke-dasharray="18 4 3 4"/>

  <!-- ============ SECTION MARKERS A-A ============ -->
  <g stroke-width="1.2">
    <line x1="360" y1="500" x2="360" y2="580" stroke-dasharray="14 3 3 3"/>
    <line x1="624" y1="500" x2="624" y2="580" stroke-dasharray="14 3 3 3"/>
  </g>
  <polygon points="352,580 368,580 360,598" fill="#e10000" stroke="none"/>
  <polygon points="616,580 632,580 624,598" fill="#e10000" stroke="none"/>
  <text x="346" y="492" stroke="none" fill="#e10000" font-weight="bold" font-size="22">A</text>
  <text x="610" y="492" stroke="none" fill="#e10000" font-weight="bold" font-size="22">A</text>

  <!-- ============ SECTION MARKERS B-B ============ -->
  <g stroke-width="1.2">
    <line x1="360" y1="1180" x2="360" y2="1260" stroke-dasharray="14 3 3 3"/>
    <line x1="624" y1="1180" x2="624" y2="1260" stroke-dasharray="14 3 3 3"/>
  </g>
  <polygon points="352,1180 368,1180 360,1162" fill="#e10000" stroke="none"/>
  <polygon points="616,1180 632,1180 624,1162" fill="#e10000" stroke="none"/>
  <text x="346" y="1290" stroke="none" fill="#e10000" font-weight="bold" font-size="22">B</text>
  <text x="610" y="1290" stroke="none" fill="#e10000" font-weight="bold" font-size="22">B</text>

  <!-- ============ KEY DIMENSION CALL-OUTS ============ -->
  <g stroke="#e10000" stroke-width="1.0" font-size="16" font-weight="bold">

    <!-- Ø 37.3  (top neck diameter) -->
    <line x1="400" y1="45" x2="584" y2="45"
          marker-start="url(#aS)" marker-end="url(#aE)"/>
    <text x="597" y="50" stroke="none" fill="#e10000">&#216; 37.3</text>

    <!-- 301 total height (left side) -->
    <line x1="110" y1="40"   x2="215" y2="40"/>
    <line x1="110" y1="1270" x2="215" y2="1270"/>
    <line x1="140" y1="40"   x2="140" y2="1270"
          marker-start="url(#aS)" marker-end="url(#aE)"/>
    <text x="95" y="655" stroke="none" fill="#e10000" font-size="22"
          transform="rotate(-90 95 655)">301 &#177; 1.2</text>

    <!-- 78.1 base width -->
    <line x1="215" y1="1290" x2="215" y2="1270"/>
    <line x1="758" y1="1290" x2="758" y2="1270"/>
    <text x="455" y="1287" stroke="none" fill="#e10000" font-size="18">78.1</text>

    <!-- 1500 +21/0 cc fill level -->
    <text x="780" y="312" stroke="none" fill="#e10000" font-size="20">1500</text>
    <text x="848" y="304" stroke="none" fill="#e10000" font-size="12">+21</text>
    <text x="855" y="320" stroke="none" fill="#e10000" font-size="12">0</text>
    <text x="876" y="312" stroke="none" fill="#e10000" font-size="20">cc</text>
    <text x="780" y="340" stroke="none" fill="#e10000" font-size="14"
          text-decoration="underline">FILL LEVEL</text>

    <!-- handle callout -->
    <path d="M 810,580 L 770,580" stroke-width="1.0"/>
    <text x="818" y="586" stroke="none" fill="#e10000" font-size="16">SIPA H</text>
  </g>

  <defs>
    <marker id="aE" viewBox="0 0 12 12" refX="11" refY="6"
            markerWidth="11" markerHeight="11" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#e10000" stroke="none"/>
    </marker>
    <marker id="aS" viewBox="0 0 12 12" refX="1" refY="6"
            markerWidth="11" markerHeight="11" orient="auto">
      <path d="M12,0 L0,6 L12,12 z" fill="#e10000" stroke="none"/>
    </marker>
  </defs>

</svg>
