<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     font-family="Arial, sans-serif" font-size="14"
     stroke="#e10000" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ==================================================================
       BOTTLE WIREFRAME OVERLAY  ·  Technical line drawing traced on top
       of the real Afia 1.5 L bottle reference photo.
       ================================================================== -->

  <!-- background photo -->
  <image xlink:href="file:///c:/Users/Dell/Downloads/ChatGPT%20Image%20Apr%2020,%202026,%2002_33_04%20AM.png"
         x="0" y="0" width="1000" height="1500"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- ============ CENTRE-LINE ============ -->
  <line x1="492" y1="30" x2="492" y2="1485"
        stroke-width="1.2" stroke-dasharray="18 4 3 4"/>

  <!-- ============ NECK OPENING (top rim) ============ -->
  <g stroke-width="2.2">
    <!-- outer neck walls -->
    <line x1="448" y1="40"  x2="448" y2="160"/>
    <line x1="536" y1="40"  x2="536" y2="160"/>
    <!-- top rim ellipse -->
    <path d="M448,40 Q492,22 536,40"/>
    <path d="M448,40 Q492,58 536,40" stroke-dasharray="3 3"/>
  </g>
  <!-- thread scallops -->
  <g stroke-width="1.0">
    <path d="M448,62  Q460,54 472,62 Q484,70 496,62 Q508,54 520,62 Q532,70 536,66"/>
    <path d="M448,82  Q460,74 472,82 Q484,90 496,82 Q508,74 520,82 Q532,90 536,86"/>
    <path d="M448,102 Q460,94 472,102 Q484,110 496,102 Q508,94 520,102 Q532,110 536,106"/>
    <path d="M448,122 Q460,114 472,122 Q484,130 496,122 Q508,114 520,122 Q532,130 536,126"/>
  </g>

  <!-- ============ DOME SHOULDER ============ -->
  <!-- left shoulder curve -->
  <path stroke-width="2.2" d="
    M 448,160
    C 410,175 365,205 330,255
    C 300,305 280,360 275,420
    "/>
  <!-- right shoulder curve (to handle attach) -->
  <path stroke-width="2.2" d="
    M 536,160
    C 580,175 630,205 665,255
    C 692,300 710,345 716,390
    "/>

  <!-- ============ WAIST  (inward pinch) ============ -->
  <!-- left waist -->
  <path stroke-width="2.2" d="
    M 275,420
    C 272,480 282,535 305,580
    "/>
  <!-- right waist (below handle reconnect) -->
  <path stroke-width="2.2" d="
    M 716,600
    C 716,640 700,665 680,685
    "/>

  <!-- ============ LOWER BODY  (wider rectangular, rounded corners) ============ -->
  <!-- left lower body -->
  <path stroke-width="2.2" d="
    M 305,580
    C 285,610 255,640 232,680
    C 218,710 215,745 215,790
    L 215,1370
    C 215,1405 225,1430 245,1450
    L 285,1480
    L 700,1480
    "/>
  <!-- right lower body (from below handle bottom) -->
  <path stroke-width="2.2" d="
    M 680,685
    C 710,710 745,745 758,790
    L 758,1370
    C 758,1405 748,1430 728,1450
    L 700,1480
    "/>

  <!-- ============ INTEGRATED HANDLE (right side) ============ -->
  <!-- outer handle loop -->
  <path stroke-width="2.2" d="
    M 716,390
    C 778,405 830,445 855,500
    C 878,555 875,620 845,660
    C 818,692 770,692 742,670
    C 728,655 720,630 716,600
    "/>
  <!-- inner oval grip cut-out -->
  <path stroke-width="1.6" d="
    M 752,440
    C 780,435 810,460 820,498
    C 830,540 828,590 808,618
    C 790,640 760,642 740,625
    C 725,605 720,575 722,540
    C 726,498 732,462 752,440 Z
    "/>

  <!-- ============ DECORATIVE LABEL-EDGE DIAGONAL ============ -->
  <path stroke-width="1.4" d="M 300,470 Q 500,620 720,730"/>

  <!-- ============ FOUR GRIP RIBS (lower body) ============ -->
  <g stroke-width="1.4">
    <rect x="320" y="950"  width="350" height="14" rx="7"/>
    <rect x="320" y="1000" width="350" height="14" rx="7"/>
    <rect x="320" y="1050" width="350" height="14" rx="7"/>
    <rect x="320" y="1100" width="350" height="14" rx="7"/>
  </g>

  <!-- ============ SIDE CLIP FEATURES ============ -->
  <g stroke-width="1.4">
    <path d="M215,910  q-14,6 -14,20 q0,14 14,20"/>
    <path d="M215,1250 q-14,6 -14,20 q0,14 14,20"/>
    <path d="M758,910  q14,6 14,20 q0,14 -14,20"/>
    <path d="M758,1250 q14,6 14,20 q0,14 -14,20"/>
  </g>

  <!-- ============ BASE FEET ============ -->
  <g stroke-width="1.4">
    <path d="M300,1480 q12,-14 32,-14 q20,0 32,14"/>
    <path d="M430,1480 q12,-14 32,-14 q20,0 32,14"/>
    <path d="M560,1480 q12,-14 32,-14 q20,0 32,14"/>
  </g>

  <!-- ============ FILL-LEVEL DASHED REFERENCE ============ -->
  <line x1="215" y1="320" x2="920" y2="320"
        stroke-width="1.1" stroke-dasharray="18 4 3 4"/>

  <!-- ============ SECTION MARKERS A-A ============ -->
  <g stroke-width="1.2">
    <line x1="360" y1="500" x2="360" y2="580" stroke-dasharray="14 3 3 3"/>
    <line x1="624" y1="500" x2="624" y2="580" stroke-dasharray="14 3 3 3"/>
  </g>
  <polygon points="352,580 368,580 360,598" fill="#e10000" stroke="none"/>
  <polygon points="616,580 632,580 624,598" fill="#e10000" stroke="none"/>
  <text x="346" y="492" stroke="none" fill="#e10000" font-weight="bold" font-size="22">A</text>
  <text x="610" y="492" stroke="none" fill="#e10000" font-weight="bold" font-size="22">A</text>

  <!-- ============ SECTION MARKERS B-B ============ -->
  <g stroke-width="1.2">
    <line x1="360" y1="1180" x2="360" y2="1260" stroke-dasharray="14 3 3 3"/>
    <line x1="624" y1="1180" x2="624" y2="1260" stroke-dasharray="14 3 3 3"/>
  </g>
  <polygon points="352,1180 368,1180 360,1162" fill="#e10000" stroke="none"/>
  <polygon points="616,1180 632,1180 624,1162" fill="#e10000" stroke="none"/>
  <text x="346" y="1290" stroke="none" fill="#e10000" font-weight="bold" font-size="22">B</text>
  <text x="610" y="1290" stroke="none" fill="#e10000" font-weight="bold" font-size="22">B</text>

  <!-- ============ KEY DIMENSION CALL-OUTS ============ -->
  <g stroke="#e10000" stroke-width="1.0" font-size="16" font-weight="bold">

    <!-- Ø 37.3  (top neck diameter) -->
    <line x1="448" y1="18" x2="536" y2="18"
          marker-start="url(#aS)" marker-end="url(#aE)"/>
    <text x="548" y="23" stroke="none" fill="#e10000">&#216; 37.3</text>

    <!-- 301 total height (left side) -->
    <line x1="110" y1="40"   x2="215" y2="40"/>
    <line x1="110" y1="1480" x2="215" y2="1480"/>
    <line x1="140" y1="40"   x2="140" y2="1480"
          marker-start="url(#aS)" marker-end="url(#aE)"/>
    <text x="95" y="760" stroke="none" fill="#e10000" font-size="22"
          transform="rotate(-90 95 760)">301 &#177; 1.2</text>

    <!-- 78.1 base width -->
    <line x1="215" y1="1500" x2="215" y2="1480"/>
    <line x1="758" y1="1500" x2="758" y2="1480"/>
    <text x="455" y="1490" stroke="none" fill="#e10000" font-size="18">78.1</text>

    <!-- 1500 +21/0 cc fill level -->
    <text x="780" y="312" stroke="none" fill="#e10000" font-size="20">1500</text>
    <text x="848" y="304" stroke="none" fill="#e10000" font-size="12">+21</text>
    <text x="855" y="320" stroke="none" fill="#e10000" font-size="12">0</text>
    <text x="876" y="312" stroke="none" fill="#e10000" font-size="20">cc</text>
    <text x="780" y="340" stroke="none" fill="#e10000" font-size="14"
          text-decoration="underline">FILL LEVEL</text>

    <!-- handle callout -->
    <path d="M 900,540 L 860,540" stroke-width="1.0"/>
    <text x="908" y="546" stroke="none" fill="#e10000" font-size="16">SIPA H</text>
  </g>

  <defs>
    <marker id="aE" viewBox="0 0 12 12" refX="11" refY="6"
            markerWidth="11" markerHeight="11" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#e10000" stroke="none"/>
    </marker>
    <marker id="aS" viewBox="0 0 12 12" refX="1" refY="6"
            markerWidth="11" markerHeight="11" orient="auto">
      <path d="M12,0 L0,6 L12,12 z" fill="#e10000" stroke="none"/>
    </marker>
  </defs>

</svg>
